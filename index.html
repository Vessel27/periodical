<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Periodic Table of Elements</h1>

    <div class="periodic-table" id="table">
        <!-- Elements will be injected here by script.js -->
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background: var(--diatomic-nonmetal)"></div>Diatomic Nonmetal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--noble-gas)"></div>Noble Gas</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--alkali-metal)"></div>Alkali Metal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--alkaline-earth-metal)"></div>Alkaline Earth Metal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--metalloid)"></div>Metalloid</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--polyatomic-nonmetal)"></div>Polyatomic Nonmetal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--post-transition-metal)"></div>Post-transition Metal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--transition-metal)"></div>Transition Metal</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--lanthanide)"></div>Lanthanide</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--actinide)"></div>Actinide</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Details will be injected here by script.js -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
