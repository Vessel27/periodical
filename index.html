<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --modal-bg: #2d2d2d;
            --accent-color: #4a90e2;
            
            /* Element Category Colors */
            --diatomic-nonmetal: #00ffcc;
            --noble-gas: #ff66cc;
            --alkali-metal: #ff6666;
            --alkaline-earth-metal: #ffcc66;
            --metalloid: #cccc66;
            --polyatomic-nonmetal: #66ff66;
            --post-transition-metal: #66cccc;
            --transition-metal: #ff9999;
            --lanthanide: #ffb3e6;
            --actinide: #ff99cc;
            --unknown: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 5px;
            max-width: 1200px;
            width: 100%;
        }

        .element {
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            font-size: 0.7rem;
            border-radius: 4px;
        }

        .element:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .element .number {
            font-size: 0.6rem;
        }

        .element .symbol {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .element .name {
            font-size: 0.5rem;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Category Coloring */
        .diatomic-nonmetal { background-color: var(--diatomic-nonmetal); color: #000; }
        .noble-gas { background-color: var(--noble-gas); color: #000; }
        .alkali-metal { background-color: var(--alkali-metal); color: #000; }
        .alkaline-earth-metal { background-color: var(--alkaline-earth-metal); color: #000; }
        .metalloid { background-color: var(--metalloid); color: #000; }
        .polyatomic-nonmetal { background-color: var(--polyatomic-nonmetal); color: #000; }
        .post-transition-metal { background-color: var(--post-transition-metal); color: #000; }
        .transition-metal { background-color: var(--transition-metal); color: #000; }
        .lanthanide { background-color: var(--lanthanide); color: #000; }
        .actinide { background-color: var(--actinide); color: #000; }
        .unknown { background-color: var(--unknown); color: #000; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--modal-bg);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .modal-symbol {
            font-size: 3rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
        }

        .modal-title h2 {
            margin: 0;
            font-size: 2rem;
        }

        .modal-title p {
            margin: 5px 0 0;
            color: #aaa;
            font-style: italic;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-item {
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            display: block;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .summary {
            grid-column: span 2;
            margin-top: 15px;
            line-height: 1.6;
            color: #ddd;
            font-size: 0.95rem;
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            max-width: 1000px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }

        @media (max-width: 800px) {
            .periodic-table {
                grid-template-columns: repeat(9, 1fr);
            }
            .modal-body {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <h1>Periodic Table of Elements</h1>

    <div class="periodic-table" id="periodicTable">
        <!-- Elements will be injected here -->
    </div>

    <div class="legend" id="legend">
        <!-- Legend will be injected here -->
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <div id="modalDetails">
                <!-- Details will be injected here -->
            </div>
        </div>
    </div>

    <script>
        const categories = {
            "diatomic nonmetal": "diatomic-nonmetal",
            "noble gas": "noble-gas",
            "alkali metal": "alkali-metal",
            "alkaline earth metal": "alkaline-earth-metal",
            "metalloid": "metalloid",
            "polyatomic nonmetal": "polyatomic-nonmetal",
            "post-transition metal": "post-transition-metal",
            "transition metal": "transition-metal",
            "lanthanide": "lanthanide",
            "actinide": "actinide",
            "unknown, probably transition metal": "unknown",
            "unknown, probably post-transition metal": "unknown",
            "unknown, probably metalloid": "unknown",
            "unknown, predicted to be noble gas": "unknown"
        };

        async function init() {
            try {
                const response = await fetch('periodic_table.json');
                const data = await response.json();
                const elements = data.elements;

                const table = document.getElementById('periodicTable');
                const legend = document.getElementById('legend');

                // Create Legend
                const uniqueCategories = [...new Set(elements.map(e => e.category))];
                uniqueCategories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'legend-item';
                    const colorClass = categories[cat] || 'unknown';
                    div.innerHTML = `
                        <div class="legend-color ${colorClass}"></div>
                        <span>${cat}</span>
                    `;
                    legend.appendChild(div);
                });

                // Create Elements
                elements.forEach(el => {
                    const div = document.createElement('div');
                    const categoryClass = categories[el.category] || 'unknown';
                    div.className = `element ${categoryClass}`;
                    
                    // Positioning
                    div.style.gridColumn = el.xpos;
                    div.style.gridRow = el.ypos;

                    div.innerHTML = `
                        <div class="number">${el.number}</div>
                        <div class="symbol">${el.symbol}</div>
                        <div class="name">${el.name}</div>
                    `;

                    div.onclick = () => showModal(el);
                    table.appendChild(div);
                });

            } catch (error) {
                console.error('Error loading element data:', error);
            }
        }

        function showModal(el) {
            const overlay = document.getElementById('modalOverlay');
            const details = document.getElementById('modalDetails');
            const categoryClass = categories[el.category] || 'unknown';

            details.innerHTML = `
                <div class="modal-header">
                    <div class="modal-symbol ${categoryClass}">${el.symbol}</div>
                    <div class="modal-title">
                        <h2>${el.name}</h2>
                        <p>${el.category}</p>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="info-item">
                        <span class="info-label">Atomic Number</span>
                        <span class="info-value">${el.number}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Atomic Mass</span>
                        <span class="info-value">${el.atomic_mass} u</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Phase</span>
                        <span class="info-value">${el.phase}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Density</span>
                        <span class="info-value">${el.density || 'N/A'} g/cm³</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Melting Point</span>
                        <span class="info-value">${el.melt || 'N/A'} K</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Boiling Point</span>
                        <span class="info-value">${el.boil || 'N/A'} K</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Discovered By</span>
                        <span class="info-value">${el.discovered_by || 'Ancient'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Electron Configuration</span>
                        <span class="info-value">${el.electron_configuration}</span>
                    </div>
                    <div class="summary">
                        ${el.summary}
                    </div>
                </div>
            `;

            overlay.style.display = 'flex';
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('modalOverlay').style.display = 'none';
        };

        window.onclick = (event) => {
            const overlay = document.getElementById('modalOverlay');
            if (event.target == overlay) {
                overlay.style.display = 'none';
            }
        };

        init();
    </script>
</body>
</html>
